name: CD

on: # Gatilho para disparar o workflow quando o workflow de CI for concluído com sucesso na branch main
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production oracle # Define o ambiente das variáveis de ambiente para produção
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps: # Definição dos passos do job
      - name: Validate required secrets # Verifica se as variáveis de ambiente necessárias estão configuradas
        run: |
          missing=""
          [ -z "$VPS_HOST" ]    && missing="$missing VPS_HOST"
          [ -z "$VPS_USER" ]    && missing="$missing VPS_USER"
          [ -z "$VPS_SSH_KEY" ] && missing="$missing VPS_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::The following required repository secrets are not configured:$missing"
            echo "Please add them under Settings > Secrets and variables > Actions."
            exit 1
          fi
        env: # Insere as variáveis de ambiente necessárias para a validação
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via SSH # Realiza o deploy no servidor via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script:
            | # Comandos a serem executados no servidor para realizar o deploy
            cd /home/ubuntu/nimbus

            # Puxa as últimas mudanças do repositório, garantindo que a branch main esteja atualizada
            git pull origin main

            # Construir e iniciar containers usando Docker Compose (usa docker-compose.yml da raiz)
            docker compose up -d --build

            # Executa migrations no banco de dados, ignorando erros caso não haja migrations pendentes
            docker exec nimbus-api node -e "
              const { execSync } = require('child_process');
              execSync('npx typeorm migration:run', { stdio: 'inherit' });
            " || true

            # Limpa imagens e containers antigos para liberar espaço
            docker image prune -f

            echo "Deploy completed successfully!"
