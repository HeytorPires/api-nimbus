name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    environment: production oracle
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Validate required secrets
        run: |
          missing=""
          [ -z "$VPS_HOST" ]    && missing="$missing VPS_HOST"
          [ -z "$VPS_USER" ]    && missing="$missing VPS_USER"
          [ -z "$VPS_SSH_KEY" ] && missing="$missing VPS_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::The following required repository secrets are not configured:$missing"
            echo "Please add them under Settings > Secrets and variables > Actions."
            exit 1
          fi
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /home/ubuntu/nimbus/api-nimbus

            # Pull latest changes
            git pull origin main

            # Build and restart containers
            docker compose up -d --build

            # Run database migrations
            docker exec nimbus-api node -e "
              const { execSync } = require('child_process');
              execSync('npx typeorm migration:run', { stdio: 'inherit' });
            " || true

            # Clean up old images
            docker image prune -f

            echo "Deploy completed successfully!"
