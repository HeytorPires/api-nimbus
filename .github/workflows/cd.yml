name: CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=()
          [ -z "$VPS_HOST" ]    && missing+=("VPS_HOST")
          [ -z "$VPS_USER" ]    && missing+=("VPS_USER")
          [ -z "$VPS_SSH_KEY" ] && missing+=("VPS_SSH_KEY")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "::notice::Go to Settings → Secrets and variables → Actions and add the missing secrets."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /home/ubuntu/nimbus/api-nimbus

            # Pull latest changes
            git pull origin main

            # Build and restart containers
            docker compose up -d --build

            # Run database migrations
            docker exec nimbus-api node -e "
              const { execSync } = require('child_process');
              execSync('npx typeorm migration:run', { stdio: 'inherit' });
            " || true

            # Clean up old images
            docker image prune -f

            echo "Deploy completed successfully!"
