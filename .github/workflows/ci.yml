name: CI

on: # Gatilhos para disparar o workflow: push ou pull_request nas branches main e staging
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs: # Definição dos jobs do workflow
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps: # Definição dos passos do job
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check formatting
        run: yarn format:check

      - name: Run ESLint
        run: yarn lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps: # Definição dos passos do job
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test --ci --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps: # Definição dos passos do job
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build-local
