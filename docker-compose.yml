services:
  # Em dev: docker compose up -d (sobe só postgres + redis)
  # Em prod: docker compose --profile production up -d --build
  node:
    profiles: ['production']
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nimbus-api
    restart: unless-stopped
    tty: true
    ports:
      - '${API_PORT}:3333'
    depends_on:
      - postgres
      - redis
    volumes:
      - api_uploads:/usr/src/app/uploads
    env_file:
      - .env

  postgres:
    image: postgres:17-alpine
    container_name: nimbus-db
    restart: unless-stopped
    tty: true
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - Postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

  redis:
    image: redis:7-alpine
    container_name: redis-nimbus
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS}
    ports:
      - '${REDIS_PORT}:6379'
    env_file:
      - .env

  minio:
    image: minio/minio:latest
    container_name: nimbus-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '${MINIO_PORT}:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    env_file:
      - .env

volumes:
  Postgres_data:
  api_uploads:
  minio_data:
